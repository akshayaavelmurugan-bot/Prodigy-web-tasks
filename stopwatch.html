<!DOCTYPE html>
<html>
<head>
<title>Stopwatch Web Application</title>

<style>

body{
font-family:Arial;
background:linear-gradient(to right,#1e3c72,#2a5298);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
text-align:center;
background:rgba(0,0,0,0.4);
padding:40px;
border-radius:10px;
}

#display{
font-size:40px;
margin:20px 0;
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
border:none;
border-radius:5px;
cursor:pointer;
}

.start{
background:green;
color:white;
}

.pause{
background:orange;
color:white;
}

.reset{
background:red;
color:white;
}

.lap{
background:blue;
color:white;
}

#laps{
margin-top:20px;
max-height:150px;
overflow:auto;
}

</style>

</head>

<body>

<div class="container">

<h1>Stopwatch</h1>

<div id="display">00:00:00</div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="reset" onclick="reset()">Reset</button>
<button class="lap" onclick="lap()">Lap</button>

<div id="laps"></div>

</div>

<script>

let seconds = 0;
let minutes = 0;
let hours = 0;
let timer = null;

function updateDisplay(){

seconds++;

if(seconds == 60){
seconds = 0;
minutes++;
}

if(minutes == 60){
minutes = 0;
hours++;
}

let h = hours < 10 ? "0"+hours : hours;
let m = minutes < 10 ? "0"+minutes : minutes;
let s = seconds < 10 ? "0"+seconds : seconds;

document.getElementById("display").innerText = h + ":" + m + ":" + s;

}

function start(){
if(timer !== null) return;
timer = setInterval(updateDisplay,1000);
}

function pause(){
clearInterval(timer);
timer = null;
}

function reset(){
clearInterval(timer);
timer = null;
seconds = 0;
minutes = 0;
hours = 0;
document.getElementById("display").innerText = "00:00:00";
document.getElementById("laps").innerHTML = "";
}

function lap(){

let lapTime = document.getElementById("display").innerText;

let lapItem = document.createElement("div");
lapItem.innerText = "Lap : " + lapTime;

document.getElementById("laps").appendChild(lapItem);

}

</script>

</body>
</html>
